version: '3.9'

services:
  # ─── Bases de datos ───────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: linguaflow-postgres
    environment:
      POSTGRES_DB: linguaflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    container_name: linguaflow-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: linguaflow-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Microservicios ───────────────────────────────────────────────────────

  ms-usuarios:
    build: ./ms-usuarios
    container_name: linguaflow-ms-usuarios
    ports:
      - '3001:3001'
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/linguaflow
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - MS_USUARIOS_PORT=3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ms-canciones:
    build: ./ms-canciones
    container_name: linguaflow-ms-canciones
    ports:
      - '3002:3002'
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/linguaflow
      - REDIS_URL=redis://redis:6379
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - MS_CANCIONES_PORT=3002
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    container_name: linguaflow-gateway
    ports:
      - '3000:3000'
    environment:
      - MS_USUARIOS_URL=http://ms-usuarios:3001
      - MS_CANCIONES_URL=http://ms-canciones:3002
      - API_GATEWAY_PORT=3000
    depends_on:
      - ms-usuarios
      - ms-canciones
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: linguaflow-frontend
    ports:
      - '3001:3001'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:
