server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: ms-notas-metas

  datasource:
    url: jdbc:postgresql://postgresql-elish.alwaysdata.net:5432/elish_notara
    username: elish_2
    password: kbe_3036
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true

  h2:
    console:
      enabled: false

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka}

  instance:
    hostname: ms-notas-metas
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always