# ── Servidor ──────────────────────────────────────────────────────────────────
server.port=${MS_USUARIOS_PORT:8080}

# ── Base de datos (PostgreSQL) ─────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/linguaflow}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Redis ──────────────────────────────────────────────────────────────────────
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# ── JWT ────────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:cambia_esto_por_un_string_largo_y_seguro}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-secret=${JWT_REFRESH_SECRET:otro_string_largo_y_seguro}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.com.notara=INFO
